name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4

      # Unix (Linux and macOS)
      - name: Set up MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      # Windows
      - name: Set up MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Update SQLite sources (required before build)
      - name: Update SQLite amalgamation (Unix)
        if: runner.os != 'Windows'
        run: sh scripts/update_sqlite.sh

      - name: Update SQLite amalgamation (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sh scripts/update_sqlite.sh

      # Update dependencies
      - name: Update dependencies
        run: moon update

      # Build the native executable
      - name: Build honeydew
        run: moon build honeydew/cmd/main --target native

      # Prepare distribution directory
      - name: Prepare dist directory
        shell: bash
        run: |
          mkdir -p dist/honeydew
          cp README.md LICENSE dist/honeydew/

      # Copy executable (Unix)
      - name: Copy executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp _build/native/release/build/tiibun/honeydew/cmd/main/main.exe dist/honeydew/honeydew

      # Copy executable (Windows)
      - name: Copy executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp _build/native/release/build/tiibun/honeydew/cmd/main/main.exe dist/honeydew/honeydew.exe

      # Create tar.gz archive (Linux and macOS)
      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf honeydew-${{ runner.os }}-${{ runner.arch }}.tar.gz honeydew

      # Create zip archive (Windows)
      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\honeydew -DestinationPath dist\honeydew-${{ runner.os }}-${{ runner.arch }}.zip

      # Upload artifacts (Unix)
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: honeydew-${{ runner.os }}-${{ runner.arch }}
          path: dist/honeydew-${{ runner.os }}-${{ runner.arch }}.tar.gz

      # Upload artifacts (Windows)
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: honeydew-${{ runner.os }}-${{ runner.arch }}
          path: dist/honeydew-${{ runner.os }}-${{ runner.arch }}.zip
